name: Build and Deploy
on:
  push:
    branches:
      - main
  pull_request: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Setup Node ✨
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: npm

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Build 🔧
        run: npm run build

      - name: Post Build Actions 🛠️
        run: npm run github-post-build
        env:
          NODE_ENV: production

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: github-pages
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Setup Node ✨
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: npm

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Build 🔧
        run: npm run build

      - name: Post Build Actions 🛠️
        run: npm run github-post-build
        env:
          NODE_ENV: production

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@releases/v4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: pages
          FOLDER: dist
          CLEAN: true
